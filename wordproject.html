<!DOCTYPE html>
<html lang="en"> 
    <head> 
        <meta charset="UTF-8">
        <title> WORD PROJECT </title>
        <!-- css sheet-->
        <link rel="stylesheet" href="wordproject.css">
        <!-- bootstrap css-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    </head>
    <body>

        <div id="selectorsdiv"> 

            <div class="row">
                <div class="col" id="createtextbox">
                    <button onclick="grab()" id="grabshit"> Create </button> 
                    <input type="text" id="text" placeholder="Enter desired text"> <br>
                </div>
            </div>

            <div class="row">
    
                <div class="col">
                    <label for="color"><b>Select a color</b></label>
                    <select id="color">
                        <option value="black" checked> Black</option>
                        <option value="red"> Red</option>
                        <option value="orange"> Orange </option>
                        <option value="yellow"> Yellow </option>
                        <option value="green"> Green </option>
                        <option value="blue"> Blue </option>
                        <option value="indigo"> Indigo </option>
                        <option value="violet"> Violet </option>
                        <option value="pink"> Pink </option>

                    </select>
                </div>

                <div class="col">
                    <label for="style"> <b>Select a style</b>  </label> <br>
                    <input type="radio" id="p" value="p" name="style" checked> <label for="p"> Paragraph</label> <br>
                    <input type="radio" id="h1" value="h1" name="style"> <label for="h1"> Heading 1</label> <br>
                    <input type="radio" id="h2" value="h2" name="style"> <label for="h2"> Heading 2 </label> <br>
                    <input type="radio" id="h4" value="h4" name="style"> <label for="h4"> Heading 4</label> <br>
                </div>

                <div class="col">
                    <label for="font"> <b>Select font style</b></label> <br>
                    <input type="radio" name="font" id="nfont" value="0" checked> <label for="nfont"> Normal</label> <br>
                    <input type="radio" name="font" id="emfont" value="1"> <label for="emfont"> Emphasis</label> <br>
                    <input type="radio" name="font" id="boldfont" value="2"> <label for="boldfont"> Bold </label> <br>
                </div>
            </div>

        </div>





        <!--where the shit will spew out-->
        <div id="outputdiv">
        


            <button onclick="resetpage()" id="resetshit">Reset page</button><br><br>
            <div id="output"> 

            </div>

        </div>

        








        <script src="wordproject.js"> </script>


    </body>

</html>
